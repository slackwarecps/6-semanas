<app-navbar></app-navbar>

<div class="testa-resposta">
  <h1>🧪 Testar Resposta LLM</h1>
  <div class="testa-resposta__model-info">
    Modelo ativo por padrão: <strong>{{ defaultModel }}</strong>
  </div>

  <div class="testa-resposta__selector-container">
    <label for="modelSelect">Altere o modelo globalmente: </label>
    <select
      id="modelSelect"
      class="testa-resposta__select"
      [(ngModel)]="selectedModel"
      (ngModelChange)="onModelChange($event)"
    >
      <option value="claude">claude</option>
      <option value="deepseek">deepseek</option>
    </select>
  </div>

  <textarea
    class="testa-resposta__textarea"
    rows="8"
    placeholder="Digite a pergunta que deseja enviar ao backend..."
    [(ngModel)]="pergunta"
  ></textarea>

  <button
    type="button"
    class="testa-resposta__btn"
    [disabled]="isLoading || !pergunta.trim()"
    (click)="onResponder()"
  >
    {{ isLoading ? 'Consultando...' : 'Responder' }}
  </button>

  @if (erro) {
    <div class="testa-resposta__erro">
      ❌ {{ erro }}
    </div>
  }

  @if (resposta) {
    <div class="testa-resposta__resultado">
      <h2>Resposta</h2>
      <pre>{{ resposta | json }}</pre>
    </div>
  }
</div>
