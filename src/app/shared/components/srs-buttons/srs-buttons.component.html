<div class="srs-buttons">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="srs-buttons__btn"
      [class.srs-buttons__btn--again]="option.value === 1"
      [class.srs-buttons__btn--hard]="option.value === 2"
      [class.srs-buttons__btn--good]="option.value === 3"
      [class.srs-buttons__btn--easy]="option.value === 4"
      (click)="select(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
